models:
  - name: orders
    description: ""
    columns:
      - name: o_orderkey
        data_type: number
        description: ""
        data_tests:
          - unique
          - not_null
      - name: o_custkey
        data_type: number
        description: ""

      - name: o_orderstatus
        data_type: varchar
        description: ""
        data_tests:
          - accepted_values:
              arguments: # available in v1.10.5 and higher. Older versions can set the <argument_name> as the top-level property.
                values: ['P', 'F']
      - name: o_totalprice
        data_type: number
        description: ""

      - name: o_orderdate
        data_type: date
        description: ""

      - name: o_orderpriority
        data_type: varchar
        description: ""

      - name: o_clerk
        data_type: varchar
        description: ""

      - name: o_shippriority
        data_type: number
        description: ""

      - name: o_comment
        data_type: varchar
        description: ""